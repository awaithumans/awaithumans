[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "awaithumans"
version = "0.1.0"
description = "The human layer for AI agents. Your agents already await promises. Now they can await humans."
readme = "README.md"
license = "MIT"
requires-python = ">=3.9"
authors = [
    { name = "Await Humans", email = "hello@awaithumans.com" },
]
keywords = [
    "human-in-the-loop", "hitl", "ai-agents", "langchain", "langgraph",
    "temporal", "human-review", "agent-workflow", "await", "human-layer",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
server = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sqlmodel>=0.0.22",
    "alembic>=1.14.0",
    "aiosqlite>=0.20.0",
    "asyncpg>=0.30.0",
    "slack-sdk>=3.33.0",
    "resend>=2.0.0",
    "typer>=0.13.0",
]
temporal = [
    "temporalio>=1.7.0",
]
langgraph = [
    "langgraph>=0.2.0",
]
verifier-claude = [
    "anthropic>=0.40.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[project.scripts]
awaithumans = "awaithumans.cli.main:app"

[project.urls]
Homepage = "https://awaithumans.dev"
Repository = "https://github.com/awaithumans/awaithumans"
Issues = "https://github.com/awaithumans/awaithumans/issues"
Documentation = "https://awaithumans.dev/docs"

[tool.ruff]
target-version = "py39"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "T20"]

[tool.mypy]
strict = true
python_version = "3.9"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
