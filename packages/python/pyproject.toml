[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# Hatchling includes the whole `awaithumans` package by default, and
# that sweep picks up non-Python files (the email template `.html`/
# `.txt` loaded via importlib.resources at runtime). No force-include
# needed — if you add it, you get duplicate-name warnings.
[tool.hatch.build.targets.wheel]
packages = ["awaithumans"]

# Bundle alembic into the wheel under `awaithumans/_alembic/` so the
# installed package can find migrations + env.py without the dev-tree
# `packages/python/alembic.ini` being present. Dev checkouts use the
# outside copy; installed wheels fall through to the bundled one —
# resolved at runtime by `db/connection.py:_alembic_paths()`.
[tool.hatch.build.targets.wheel.force-include]
"alembic.ini" = "awaithumans/_alembic/alembic.ini"
"alembic" = "awaithumans/_alembic/alembic"

[project]
name = "awaithumans"
version = "0.1.0"
description = "The human layer for AI agents. Your agents already await promises. Now they can await humans."
readme = "README.md"
license = "MIT"
# PEP 604 union syntax (`X | None`) is used throughout the codebase —
# that's 3.10+. Pydantic v2 evaluates annotations at runtime and crashes
# on 3.9 with "unsupported operand type(s) for |" if we claim 3.9 compat.
# Major agent frameworks (LangGraph, Temporal, OpenAI SDK) already
# require 3.10+, so no real user is left behind.
requires-python = ">=3.10"
authors = [
    { name = "Await Humans", email = "hello@awaithumans.com" },
]
keywords = [
    "human-in-the-loop", "hitl", "ai-agents", "langchain", "langgraph",
    "temporal", "human-review", "agent-workflow", "await", "human-layer",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries",
    "Typing :: Typed",
]
dependencies = [
    "httpx>=0.27.0",
    "pydantic>=2.0.0",
]

[project.optional-dependencies]
server = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic-settings>=2.0.0",
    "sqlmodel>=0.0.22",
    # `greenlet` is SQLAlchemy's C-extension dep for async sessions.
    # sqlmodel doesn't ship the `[asyncio]` extra transitively, so on
    # fresh installs the aiosqlite driver raises `ValueError: the
    # greenlet library is required` at first connection. List it
    # explicitly so `pip install awaithumans[server]` just works.
    "greenlet>=3.0",
    "alembic>=1.14.0",
    "aiosqlite>=0.20.0",
    "asyncpg>=0.30.0",
    "slack-sdk>=3.33.0",
    # slack_sdk has no runtime deps of its own — the async client
    # imports aiohttp lazily, so without this listed explicitly a fresh
    # `pip install awaithumans[server]` succeeds but any async Slack call
    # raises ModuleNotFoundError at runtime. List it directly.
    "aiohttp>=3.10.0",
    # Starlette only parses `application/x-www-form-urlencoded` /
    # `multipart/form-data` bodies when python-multipart is installed.
    # Slack sends interaction payloads as form-encoded, so without this
    # every interactions webhook 500s with an AssertionError. Not a
    # transitive dep of fastapi/starlette — must be declared.
    "python-multipart>=0.0.12",
    "resend>=2.0.0",
    "typer>=0.13.0",
    "cryptography>=43.0.0",
    "aiosmtplib>=3.0.0",
    # Password hashing for per-user dashboard login. argon2id is the
    # OWASP-recommended default for new systems (RFC 9106 params).
    "argon2-cffi>=23.1.0",
]
temporal = [
    "temporalio>=1.7.0",
]
langgraph = [
    "langgraph>=0.2.0",
]
verifier-claude = [
    "anthropic>=0.40.0",
]
verifier-openai = [
    "openai>=1.50.0",
]
verifier-gemini = [
    "google-generativeai>=0.8.0",
]
verifier-azure = [
    "openai>=1.50.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
    "mypy>=1.13.0",
]

[project.scripts]
awaithumans = "awaithumans.cli.main:app"

[project.urls]
Homepage = "https://awaithumans.dev"
Repository = "https://github.com/awaithumans/awaithumans"
Issues = "https://github.com/awaithumans/awaithumans/issues"
Documentation = "https://awaithumans.dev/docs"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "SIM", "T20"]

# FastAPI's `Depends(...)` / `Path(...)` / `Query(...)` / `Body(...)` in
# argument defaults is idiomatic — the whole dependency-injection system
# relies on it. Suppress B008 for these only.
[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Path",
    "fastapi.Query",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.File",
    "fastapi.Form",
]

# Email template renderers emit inline-styled HTML as fragment strings.
# Some fragments naturally exceed 100 chars; breaking them mangles the
# output and doesn't improve readability.
[tool.ruff.lint.per-file-ignores]
"awaithumans/server/channels/email/templates/renderers.py" = ["E501"]

[tool.mypy]
strict = true
python_version = "3.10"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
