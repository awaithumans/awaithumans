[alembic]
script_location = %(here)s/alembic

# Date-based filenames so merge conflicts are visible at a glance
# and chronology is trivial to read without running Alembic.
# See CONTRIBUTING.md §Database migrations for the full discipline.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# URL is set programmatically in env.py from awaithumans.server.core.config.
sqlalchemy.url = sqlite:///.awaithumans/dev.db

prepend_sys_path = .

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
